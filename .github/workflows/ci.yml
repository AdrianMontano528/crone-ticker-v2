name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22.21.1"
  APP_NAME: cron-ticker-v2

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: dist

    steps:
      - uses: actions/checkout@v4

      - name: Show variables
        run: |
          echo "NODE_VERSION: ${{ env.NODE_VERSION }}"
          echo "APP_NAME: ${{ env.APP_NAME }}"
          echo "BUILD_DIR: ${{ env.BUILD_DIR }}"

      - name: Build
        run: npm run build
        env:
          APP_VERSION: "3.0.0"


        